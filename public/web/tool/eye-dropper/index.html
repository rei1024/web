<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />

    <title>スポイトツール</title>

    <link rel="stylesheet" href="/web/style.css" />
    <script type="module" src="./index.js"></script>
  </head>
  <body>
    <header>
      <header>
        <nav>
          <strong><a href="/web">Web</a></strong> &gt;
          <strong><a href="/web/tool">ツール</a></strong>
        </nav>
      </header>
    </header>
    <main>
      <h1>スポイトツール</h1>
      <div style="margin-block: 20px">
        <button id="show_eye_dropper">スポイトツール起動</button>
      </div>
      <div>
        <style>
          .sample {
            width: 300px;
            height: 200px;
            background:
              linear-gradient(
                217deg,
                rgba(255, 0, 0, 0.8),
                rgba(255, 0, 0, 0) 70.71%
              ),
              linear-gradient(
                127deg,
                rgba(0, 255, 0, 0.8),
                rgba(0, 255, 0, 0) 70.71%
              ),
              linear-gradient(
                336deg,
                rgba(0, 0, 255, 0.8),
                rgba(0, 0, 255, 0) 70.71%
              );
          }
        </style>
        <div class="sample"></div>
        <div id="result_hex"></div>
        <div id="result_dec"></div>
        <div id="result" style="width: 80px; height: 80px"></div>
      </div>
    </main>
    <footer style="margin-top: 40px">
      <a
        href="https://developer.mozilla.org/en-US/docs/Web/API/EyeDropper_API"
        target="_blank"
        rel="noopener"
        >EyeDropper API | MDN</a
      >
    </footer>
  </body>
</html>
