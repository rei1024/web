<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>モックイメージジェネレータ</title>
    <link rel="stylesheet" href="/web/style.css" />
    <script type="module" src="./index.js"></script>
  </head>
  <body>
    <header>
      <nav>
        <strong><a href="/web">Web</a></strong> &gt;
        <strong><a href="/web/tool">ツール</a></strong>
      </nav>
    </header>
    <main>
      <article>
        <h1>モックイメージジェネレータ</h1>
        <div>
          <input
            id="width"
            type="number"
            value="300"
            placeholder="幅"
            min="0"
            max="10000"
          />
          ×
          <input
            id="height"
            type="number"
            value="200"
            placeholder="高さ"
            min="0"
            max="10000"
          />
        </div>
        <div style="margin-top: 8px">
          <button id="download">ダウンロード</button>
        </div>
        <div style="margin-top: 8px">
          <canvas style="max-width: 100%" id="canvas"></canvas>
        </div>
        <div>
          <span id="error-message" style="color: red; font-weight: bold"></span>
        </div>
      </article>
    </main>
  </body>
</html>
