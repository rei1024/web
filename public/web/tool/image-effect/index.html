<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>画像変換</title>
    <link rel="stylesheet" href="/web/style.css" />
    <script type="module" src="./index.js"></script>
  </head>
  <body>
    <header>
      <nav>
        <strong><a href="/web">Web</a></strong> &gt;
        <strong><a href="/web/tool">ツール</a></strong>
      </nav>
    </header>
    <main>
      <article>
        <h1>画像変換</h1>
        <div style="margin-top: 8px">
          <input type="file" id="file" />
        </div>
        <div style="margin-top: 8px">
          <img id="input" />
        </div>
        <div style="margin-block: 8px">
          プリセット
          <select id="preset">
            <option value="">選択してください</option>
            <option value="grayscale(100%)">グレースケール</option>
            <option value="brightness(120%)">明るく</option>
            <option value="brightness(80%)">暗く</option>
            <option value="contrast(120%)">コントラストを強める</option>
            <option value="contrast(80%)">コントラストを弱める</option>
            <option value="sepia(100%)">セピア</option>
            <option value="invert(100%)">反転</option>
            <option value="blur(5px)">ぼかし</option>
            <option value="hue-rotate(90deg)">色相回転</option>
            <option value="saturate(200%)">彩度を上げる</option>
            <option value="saturate(50%)">彩度を下げる</option>
          </select>
        </div>
        <div>
          <textarea
            rows="1"
            cols="30"
            id="effect"
            placeholder="例: grayscale(100%)"
          ></textarea>
        </div>
        <div>
          <canvas id="canvas"></canvas>
        </div>
        <div>
          <button id="download">ダウンロード</button>
        </div>
      </article>
    </main>
    <footer style="margin-top: 40px">
      参考:
      <a
        target="_blank"
        rel="noopener noreferrer"
        href="https://developer.mozilla.org/ja/docs/Web/API/CanvasRenderingContext2D/filter"
        >CanvasRenderingContext2D.filter - Web API | MDN</a
      >
    </footer>
  </body>
</html>
